version: '3.8'

services:
  db:
    image: postgres:15
    container_name: hahaton_db
    environment:
      POSTGRES_DB: hahaton
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
